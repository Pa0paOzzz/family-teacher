# 챈혵혥책혡징책혲짢챌짬짱책혧짙챕혚혥챌쩍짰
server.port=8080

spring.application.name=family-teacher
spring.datasource.url=jdbc:mysql://localhost:3306/family_teacher?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT 횄짤횂혚횂혥횄짠횂쩍횂짰
jwt.secret=familyteacher_secret_key_for_jwt_token_generation_must_be_long_enough_256bits
jwt.expiration=86400000
